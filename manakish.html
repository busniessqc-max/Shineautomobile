<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manakish | Pâtisserie Syrienne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500&amp;display=swap');
        .tailwind-ready { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="tailwind-ready bg-stone-50">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <a href="index.html" class="inline-flex items-center gap-2 mb-10 text-amber-700 hover:text-amber-800 font-medium">← Retour</a>
        <h1 class="heading-font text-5xl font-bold text-center mb-12">Nos Manakish</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="photo/zataar.jpeg" class="w-full h-56 object-cover" alt="Zaatar">
                <div class="p-6"><h3 class="font-semibold text-xl">Manakish Zaatar</h3><p class="text-3xl font-bold text-amber-700 mt-6">5 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="fromage" class="w-full h-56 object-cover" alt="Fromage">
                <div class="p-6"><h3 class="font-semibold text-xl">Manakish Fromage</h3><p class="text-3xl font-bold text-amber-700 mt-6">7 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="photo/Muhammara.jpeg" class="w-full h-56 object-cover" alt="Zaatar + Fromage">
                <div class="p-6"><h3 class="font-semibold text-xl">Manakish Muhamara epicé</h3><p class="text-3xl font-bold text-amber-700 mt-6">5 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="photo/viande.jpeg" class="w-full h-56 object-cover" alt="Épinards">
                <div class="p-6"><h3 class="font-semibold text-xl">Manakish Viande</h3><p class="text-3xl font-bold text-amber-700 mt-6">7 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="photo/fatayer.jpeg" class="w-full h-56 object-cover" alt="Épinards">
                <div class="p-6"><h3 class="font-semibold text-xl">Fatayer Fromage/epicé</h3><p class="text-3xl font-bold text-amber-700 mt-6">7 $</p></div>
            </div>
        </div>
    </div>
</body>
</html>
