<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissants | Pâtisserie Syrienne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500&amp;display=swap');
        .tailwind-ready { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="tailwind-ready bg-stone-50">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <a href="index.html" class="inline-flex items-center gap-2 mb-10 text-amber-700 hover:text-amber-800 font-medium">← Retour</a>
        <h1 class="heading-font text-5xl font-bold text-center mb-12">Nos Croissants & Viennoiseries</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/201/600/400" class="w-full h-56 object-cover" alt="Croissant">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Nature</h3><p class="text-3xl font-bold text-amber-700 mt-6">3,49 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/870/600/400" class="w-full h-56 object-cover" alt="Chocolat">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Chocolat</h3><p class="text-3xl font-bold text-amber-700 mt-6">3,99 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/133/600/400" class="w-full h-56 object-cover" alt="Amandes">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Amandes</h3><p class="text-3xl font-bold text-amber-700 mt-6">4,49 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/312/600/400" class="w-full h-56 object-cover" alt="Fromage">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Fromage</h3><p class="text-3xl font-bold text-amber-700 mt-6">4,29 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/451/600/400" class="w-full h-56 object-cover" alt="Zaatar">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Zaatar</h3><p class="text-3xl font-bold text-amber-700 mt-6">3,79 $</p></div>
            </div>
            <div class="bg-white rounded-3xl overflow-hidden shadow card-hover">
                <img src="https://picsum.photos/id/160/600/400" class="w-full h-56 object-cover" alt="Pistache">
                <div class="p-6"><h3 class="font-semibold text-xl">Croissant Pistache</h3><p class="text-3xl font-bold text-amber-700 mt-6">4,79 $</p></div>
            </div>
        </div>
    </div>
</body>
</html>
