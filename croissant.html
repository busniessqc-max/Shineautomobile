<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Croissant</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<h1 class="text-4xl text-center my-10 font-bold">Croissant</h1>

<div id="menu" class="grid md:grid-cols-3 gap-6 p-6"></div>

<script>
const items = Array.from({length:6}, (_,i)=>({
name: "Croissant " + (i+1),
price: "3.99$",
img: "https://picsum.photos/400/300?croissant=" + i
}));

document.getElementById("menu").innerHTML = items.map(d=>`
<div class="bg-white rounded-2xl shadow overflow-hidden">
<img src="${d.img}" class="w-full h-40 object-cover">
<div class="p-4">
<h2 class="font-bold text-xl">${d.name}</h2>
<p>${d.price}</p>
</div>
</div>
`).join("");
</script>

</body>
</html>
