<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pâtisserie Syrienne - Pâtisseries, croissants, plats, desserts et boissons authentiques à Sherbrooke.">
    <title>Pâtisserie Syrienne | Sherbrooke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500&amp;display=swap');
        
        :root {
            --primary: #d4af77;
        }
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .tailwind-ready {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .hero-slide {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .navbar-scrolled {
            background-color: rgba(212, 175, 119, 0.95);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .category-title {
            font-family: 'Playfair Display', sans-serif;
        }
    </style>
</head>
<body class="tailwind-ready">

                        <i class="fa-solid fa-phone"></i>
                        <span class="hidden sm:inline">819 432-7907</span>

                    <a href="https://www.ubereats.com/..." target="_blank"

                    <button onclick="toggleMobileMenu()" class="md:hidden w-11 h-11 flex items-center justify-center text-3xl">

    </nav>

    <script>
        // ================== DONNÉES DES PRODUITS PAR CATÉGORIE ==================
        const menuCategories = {
            patisserie: [
                { name: "Baklava aux Pistaches", desc: "Feuilles de pâte filo, pistaches et sirop à la rose", price: "6,99 $", img: "https://picsum.photos/id/1015/600/400" },
                { name: "Kunafa au Fromage", desc: "Kunafa dorée et fromage akawi fondant", price: "7,99 $", img: "https://picsum.photos/id/292/600/400" },
                // Ajoute ici tous tes produits pâtisserie

            croissant: [
                { name: "Croissant Beurre", desc: "Croissant traditionnel au beurre", price: "3,49 $", img: "https://picsum.photos/id/201/600/400" },
                { name: "Croissant Amandes", desc: "Croissant fourré à la crème d’amandes", price: "4,99 $", img: "https://picsum.photos/id/870/600/400" },
                // Ajoute tes croissants ici
            ],
            nourriture: [
                { name: "Manakish Zaatar", desc: "Pain plat au thym et huile d’olive", price: "5,99 $", img: "https://picsum.photos/id/133/600/400" },
                // Ajoute tes plats salés ici
            ],
            creme: [
                { name: "Cornet Pistache", desc: "Crème glacée pistache artisanale", price: "4,99 $", img: "https://picsum.photos/id/312/600/400" },
                // Ajoute tes crèmes glacées ici
            ],
            dessert: [
                { name: "Halawet el Jibn", desc: "Crêpe au fromage et pistaches", price: "5,49 $", img: "https://picsum.photos/id/1005/600/400" },
                // Ajoute tes autres desserts ici
            ],
            boisson: [
                { name: "Café Arabe", desc: "Café traditionnel syrien", price: "3,49 $", img: "https://picsum.photos/id/451/600/400" },
                { name: "Jus de Grenade", desc: "Jus frais pressé", price: "4,99 $", img: "https://picsum.photos/id/160/600/400" },
                // Ajoute tes boissons ici
            ]
        };

        function renderCategory(categoryId, items) {
            const container = document.getElementById(categoryId);
            container.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-stone-100 rounded-3xl overflow-hidden card-hover';
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.name}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="font-semibold text-xl mb-1">${item.name}</h3>
                        <p class="text-stone-600 text-sm line-clamp-2 mb-6">${item.desc}</p>
                        <div class="flex justify-between items-end">
                            <span class="text-3xl font-bold text-amber-700">${item.price}</span>
                            <a href="https://wa.me/18194327907?text=Bonjour%2C%20je%20voudrais%20commander%20${encodeURIComponent(item.name)}" 
                               target="_blank"
                               class="bg-amber-700 text-white px-6 py-3 rounded-2xl text-sm font-medium flex items-center gap-2 hover:bg-amber-800">
                                <i class="fa-brands fa-whatsapp"></i> Commander
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ================== INITIALISATION ==================
        window.onload = function() {
            // Slider (ton code original)
            createDots();
            showSlide(0);
            startAutoSlide();

            // Rendu des catégories
            renderCategory('cat-patisserie', menuCategories.patisserie);
            renderCategory('cat-croissant', menuCategories.croissant);
            renderCategory('cat-nourriture', menuCategories.nourriture);
            renderCategory('cat-creme', menuCategories.creme);
            renderCategory('cat-dessert', menuCategories.dessert);
            renderCategory('cat-boisson', menuCategories.boisson);

            // Formulaire + scroll navbar (ton code original)
            const form = document.getElementById('contact-form');
            if (form) form.addEventListener('submit', handleFormSubmit);
            window.addEventListener('scroll', handleScroll);

            console.log('%c✅ Site mis à jour avec les nouvelles catégories !', 'background:#d4af77;color:#222;font-size:13px;padding:4px 8px;border-radius:4px');
        };

        // Garde tes autres fonctions : showSlide, nextSlide, prevSlide, createDots, handleScroll, handleFormSubmit, toggleMobileMenu...
        // (Copie-les depuis ton code original)
    </script>
